<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toss | 离线中</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      width: min(92vw, 420px);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 12px 40px rgba(2, 6, 23, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>当前离线</h1>
    <p>网络恢复后可继续传输。若你是通过“系统分享”进入，请稍后重试。</p>
  </main>
</body>
</html>
